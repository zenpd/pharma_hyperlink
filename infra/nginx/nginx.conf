# Nginx reverse proxy — routes frontend and API through a single origin
#
# Frontend:  http://localhost/           → frontend container (port 80)
# API:       http://localhost/api/       → backend container (port 8000)
# SSE:       http://localhost/api/pipeline/stream/* → backend (no buffering)

server {
    listen 80;
    server_name localhost;

    # ── Frontend (React SPA) ──────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API proxy ─────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (Server-Sent Events for pipeline streaming)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # ── Health check ──────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
