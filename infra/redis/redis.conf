# Redis configuration for Hyperlink Engine
#
# Tuning notes:
# - appendonly: ensures durability for Celery result backend
# - maxmemory: cap at 256MB for local dev; increase in prod
# - maxmemory-policy: evict least recently used keys when full

appendonly yes
appendfsync everysec
maxmemory 256mb
maxmemory-policy allkeys-lru

# Disable dangerous commands in production
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""

# Bind to all interfaces inside Docker (exposed via ports mapping)
bind 0.0.0.0
protected-mode no
